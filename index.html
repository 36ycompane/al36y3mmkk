<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حج ذكي</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* خلفية هادئة */
body{
  min-height:100vh;
  background: linear-gradient(to bottom,#eaf6ff,#87CEEB);
  color:#222;
}

/* ناف */
nav{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:12px;
  background:#fff;
  border-bottom:2px solid #ddd;
}

nav a{
  padding:8px 15px;
  border-radius:20px;
  background:#e9f6ff;
  cursor:pointer;
  font-weight:bold;
}

/* عنوان */
h1{
  text-align:center;
  margin:15px;
}

/* صفحات */
.page{display:none;padding:15px}
.active{display:block}

/* كرت */
.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* تسجيل */
.login-box{
  max-width:300px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input{
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* المنتجات */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.product img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

button{
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#2ea6ff;
  color:#fff;
  cursor:pointer;
}

/* السلة */
.cart-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:10px 0;
  padding:10px;
  background:#f8fbff;
  border-radius:10px;
}

/* صورة داخل السلة */
.cart-item img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
}

/* الكمية */
.qty{
  display:flex;
  align-items:center;
  gap:5px;
}

.qty button{
  padding:3px 8px;
  background:#ddd;
  color:#000;
}

.total{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<nav>
  <a onclick="showPage('login')">تسجيل</a>
  <a onclick="showPage('products')">المنتجات</a>
  <a onclick="showPage('cart')">السلة 🛒</a>
</nav>

<h1>مرحبا بكم بل حج الذكي</h1>

<!-- تسجيل -->
<div id="login" class="page active">
  <div class="card login-box">
    <input type="text" placeholder="اسم المستخدم">
    <input type="password" placeholder="كلمة المرور">
    <button>دخول</button>
  </div>
</div>

<!-- المنتجات -->
<div id="products" class="page">
  <div class="products">

    <div class="card product">
      <img src="watch.jpeg">
      <h3>سوار ذكي</h3>
      <p>15 ريال</p>
      <button onclick="addToCart('سوار ذكي',15,'watch.jpeg')">إضافة</button>
    </div>

    <div class="card product">
      <img src="car.jpeg">
      <h3>عربة تنقل</h3>
      <p>43 ريال</p>
      <button onclick="addToCart('عربة تنقل',43,'car.jpeg')">إضافة</button>
    </div>

  </div>
</div>

<!-- السلة -->
<div id="cart" class="page">
  <div class="card">
    <h2>سلة التسوق</h2>
    <div id="cartItems"></div>
    <div class="total">الإجمالي: <span id="total">0</span> ريال</div>
  </div>
</div>

<script>
let cart={};

function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

function addToCart(name,price,img){
  if(!cart[name]) cart[name]={price,qty:1,img:img};
  else cart[name].qty++;
  render();
}

function change(name,val){
  cart[name].qty+=val;
  if(cart[name].qty<=0) delete cart[name];
  render();
}

function render(){
  let html="",total=0;

  for(let i in cart){
    let p=cart[i];
    total+=p.price*p.qty;

    html+=`
    <div class="cart-item">
      <img src="${p.img}">
      <span>${i}</span>
      <div class="qty">
        <button onclick="change('${i}',1)">+</button>
        ${p.qty}
        <button onclick="change('${i}',-1)">-</button>
      </div>
      <span>${p.price*p.qty} ريال</span>
    </div>`;
  }

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
}
</script>

</body>
</html>
